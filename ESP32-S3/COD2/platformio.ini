[env:esp32-s3-hosyond]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; --- Flash (16MB) ---
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
board_build.flash_mode = qio

; --- PSRAM (8MB Octal) ---
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

lib_deps =
    ; TFT_eSPI reads this project's screen config from include/User_Setup.h
    ; Pin map there: MOSI=11, MISO=13, SCLK=18, CS=15, DC=2, RST=4
    bodmer/TFT_eSPI

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; Keep include/ ahead of the library so TFT_eSPI finds include/User_Setup.h
    -Iinclude
    ; Use the ESP32-S3 HSPI bus for the TFT_eSPI display wiring above
    -DUSE_HSPI_PORT